<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Web Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="banner">
                <img src="images/image.png" alt="Bacolod City College Logo">
                <h3>Bacolod City College</h3>
                <nav>
                    <ul>
                        <li><a href="#courses">Courses</a></li>
                        <li><a href="#registrationForm">Register</a></li>
                    </ul>
                </nav>
        </header>
            </div>
                <section><br><br>
                    <div class="table" id="courses">
                        <table border="1">
                            <thead>
                                <tr>
                                    <th>Courses</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>College of Education</td>
                                </tr>
                                <tr>
                                    <td>Bachelor of Science in Information Systems</td>
                                </tr>
                                <tr>
                                    <td>Bachelor of Science in Business Administration</td>
                                </tr>
                                <tr>
                                    <td>Bachelor of Science in Entrepreneurship</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
                <footer>
                    <div class="registrationForm" id="registrationForm">
                        <h3>Registration Form</h3><br>
                        <form id="form">
                            <label>First Name *</label><br><br>
                            <input type="text" required name="firstName" placeholder="Enter first name" pattern="[A-Za-z]+" title="Letters only"><br><br>
                            <label>Family Name *</label><br><br>
                            <input type="text" required name="familyName" placeholder="Enter family name" pattern="[A-Za-z]+" title="Letters only"><br><br>
                            <label>Email Address *</label><br><br>
                            <input type="email" required name="email" placeholder="example123@gmail.com"><br><br>
                            <label>Phone Number *</label><br><br>
                            <input type="tel" required name="number" placeholder="123-456-789" maxlength="11" pattern="[0-9]{11}"><br><br>
                            <label>Select Course *</label><br><br>
                            <select name="courses">
                                <option value="">College of Education</option>
                                <option value="">Bachelor of Science in Information Systems</option>
                                <option value="">Bachelor of Science in Business Administration</option>
                                <option value="">Bachelor of science in Entrepreneurship</option>
                            </select><br><br>
                            <button type="submit" id="btn">Register Now!</button>
                        </form>
                    </div>
                </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
